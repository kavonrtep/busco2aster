samples: config/samples.tsv
busco_lineage: solanales_odb12

# Optional if omitted:
# - BUSCO datasets download to work/busco_downloads
# - IQ-TREE 3 / wASTRAL / ASTRAL4 are resolved from PATH
# - the container wrapper injects container-internal tool paths automatically
assembly_prep_root: work/assemblies_prepared
assembly_wrap_width: 80
busco_download_path: work/busco_downloads
occupancy_threshold: 0.8
species_tree_backend: wastral
thread_policy: auto
iqtree_model: MFP
iqtree_support_mode: abayes
iqtree_seed: 20260327
iqtree_ufboot_replicates: 1000
iqtree_scfl_quartets: 100
iqtree_scfl_model: auto

threads:
  default: 4
  assembly_prep: 4
  alignment: 1
  busco: 4
  concordance: 4
  iqtree: 4
  species_tree: 4

# Wrapper behavior:
# - thread_policy: auto (default) makes run_pipeline.py derive per-rule thread
#   settings from -t/--threads
# - thread_policy: fixed keeps the values above as-is

# Optional local overrides when tools are not on PATH.
# iqtree_executable: /absolute/path/to/iqtree3
# wastral_executable: /absolute/path/to/wastral
# astral4_executable: /absolute/path/to/astral4

# ── Alternative topology hypothesis testing ───────────────────────────────────
# Set run_topology_tests: false to skip the extension entirely.
run_topology_tests: true
# Branches with pp1 below this threshold are flagged as contested.
contested_branch_threshold: 0.95
# Maximum contested branches used for NNI combination generation (2^k - 1 alternatives).
max_contested_branches: 4
# Optional Newick file of user-supplied hypothesis trees to add to the candidate set.
hypothesis_trees: null
# RELL replicates for the IQ-TREE AU test.
au_test_replicates: 10000
# Model for AU-test supermatrix partitions.
# "from_gene_trees" reuses the model selected during gene-tree inference.
# Any other value is used as a literal model string (e.g. "MFP" or "LG+G4").
au_test_model: from_gene_trees
