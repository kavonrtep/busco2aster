name: Build Singularity image

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Build SIF image
        run: apptainer build busco2aster.sif busco2aster.def

      - name: Smoke test image
        run: |
          # Snakemake writes a source cache under XDG_CACHE_HOME (defaults to
          # $HOME/.cache).  Inside the read-only SIF $HOME is /root, so point
          # the cache to a writable tmpfs instead.
          export SMK="apptainer exec --env XDG_CACHE_HOME=/tmp busco2aster.sif"
          $SMK snakemake --version
          $SMK bash -lc 'iqtree3 --version'
          $SMK bash -lc 'wastral -h >/dev/null'
          $SMK python3 /opt/pipeline/run_pipeline.py --help >/dev/null
          $SMK snakemake \
            --snakefile /opt/pipeline/workflow/Snakefile_create_envs \
            --use-conda \
            --conda-prefix /opt/conda/envs \
            --conda-frontend conda \
            --cores 1 \
            /tmp/busco2aster_env_assembly_prep
          $SMK snakemake \
            --snakefile /opt/pipeline/workflow/Snakefile_create_envs \
            --use-conda \
            --conda-prefix /opt/conda/envs \
            --conda-frontend conda \
            --cores 1 \
            /tmp/busco2aster_env_dna_extract
          $SMK snakemake \
            --snakefile /opt/pipeline/workflow/Snakefile_create_envs \
            --use-conda \
            --conda-prefix /opt/conda/envs \
            --conda-frontend conda \
            --cores 1 \
            /tmp/busco2aster_env_report

      - name: Upload SIF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: busco2aster.sif
